name: Full DevOps Pipeline

on:
  push:
    branches:
      - main

jobs:

  terraform:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    outputs:
      instance_ips: ${{ steps.export.outputs.instance_ips }}

    steps:

      - uses: actions/checkout@v3

      - uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3

      - run: terraform init

      - run: terraform validate

      - run: terraform apply -auto-approve

      - name: Export IP
        id: export
        run: |
          IPS=$(terraform output -json instance_public_ips | jq -r '.[]')
          echo "instance_ips=$IPS" >> $GITHUB_OUTPUT

  ansible:
    runs-on: ubuntu-latest

    needs: terraform

    steps:

      - uses: actions/checkout@v3

      - run: sudo apt update && sudo apt install -y ansible

      - name: Setup SSH Key
        run: |
          echo "${{ secrets.EC2_KEY }}" > key.pem
          chmod 600 key.pem

      - name: Generate Inventory
        run: |
          echo "[web]" > inventory.ini
          echo "${{ needs.terraform.outputs.instance_ips }} ansible_user=ec2-user ansible_ssh_private_key_file=key.pem" >> inventory.ini

      - name: Run Ansible
        run: |
          ansible-playbook -i inventory.ini ansible/deploy.yml